<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Waste Sorter — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/admin.css">
</head>

<body>

  <header>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#48bb78" stroke-width="2">
      <polyline points="1 4 1 10 7 10" />
      <polyline points="23 20 23 14 17 14" />
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
    </svg>
    <h1>Waste Sorter Admin</h1>
    <span class="badge" id="status-badge">● Live</span>
  </header>

  <div class="grid">
    <!-- Camera -->
    <div>
      <div class="card camera-card">
        <img id="cam" src="/video_feed" alt="Camera Feed">
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Stats -->
      <div class="card">
        <div class="card-title">📊 Thống Kê Hôm Nay</div>
        <div class="stats">
          <div class="stat-item" id="si-metal">
            <div class="stat-lbl">
              <span class="dot dot-metal"></span>Metal
              <span class="pts-badge">+10đ/cái</span>
            </div>
            <span class="stat-val metal-val" id="cnt-metal">0</span>
          </div>
          <div class="stat-item" id="si-plastic">
            <div class="stat-lbl">
              <span class="dot dot-plastic"></span>Plastic
              <span class="pts-badge">+5đ/cái</span>
            </div>
            <span class="stat-val plastic-val" id="cnt-plastic">0</span>
          </div>
          <div class="stat-item" id="si-other">
            <div class="stat-lbl">
              <span class="dot dot-other"></span>Other
              <span class="pts-badge">+1đ/cái</span>
            </div>
            <span class="stat-val other-val" id="cnt-other">0</span>
          </div>
        </div>
        <button class="btn btn-danger" onclick="resetCounts()">🔄 Reset Bộ Đếm</button>
      </div>

      <!-- Active User -->
      <div class="card">
        <div class="card-title">👤 Phiên Đang Hoạt Động</div>
        <div class="active-user">
          <span class="pulse" id="pulse-dot" style="background:#718096;animation:none"></span>
          <span id="active-lbl" class="lbl-none">Chờ người dùng nhập ID...</span>
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="card leaderboard-card">
        <div class="card-title">🏆 Bảng Điểm Thành Viên</div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>ID</th>
              <th>Điểm</th>
              <th>Lần cuối</th>
            </tr>
          </thead>
          <tbody id="user-table">
            <tr>
              <td colspan="4" class="empty-msg">Chưa có dữ liệu</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="/static/admin.js"></script>
</body>

</html>
